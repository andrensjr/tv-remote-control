<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <title>TVs Remote Control Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

</head>

<body>
    <header>
        <span>💬 TVs Remote Control Chat</span>
        <span id="status">conectando...</span>
    </header>

    <main>
        <div id="messages"></div>
    </main>

    <form id="chatForm">
        <input
            id="chatInput"
            type="text"
            placeholder="Digite uma mensagem e pressione Enter..."
            autocomplete="off"
        />
        <button id="btnPing" type="button">Ping</button>
    </form>

</body>

</html>
